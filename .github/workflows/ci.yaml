  # continues integration

  name: Answer integration

  # pr on main et tout changement sur branche main
  # on == evenements : quand est ce que on active evenement (workflows) push main pr main start(ci/cd)

  on:
    push:
      branches:
        - main
    pull_request:
      branches:
        - main

  # on (OK) on demande donc quoi faire
  jobs:
    frontend-test:
      runs-on: ubuntu-latest
      # jobs target dans le dossier voulu
      defaults:
        run:
          working-directory: frontend

      # etape de deroulement du ci
      steps:
        - name: Checkout source code
          uses: actions/checkout@v4  # uses get actions/

        - name: Use node.js V18
          uses: actions/setup-node@v4
          with:
            node-version: 17

        - name: Install dependancies
          run: npm ci

        - name: Lunching tests
          run: npm test

    backend-test:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: backend

      # service for db
      services:
        mariadb:
          image: mariadb:latest

      # injection des mdp Github Secrets ${{}} : secrets=natif:githubSecrets
          env:
            DB_HOST: ${{ secrets.DB_HOST }}
            DB_PORTS: ${{ secrets.DB_HOST }}
            DB_NAME: ${{ secrets.DB_HOST }}
            DB_USER: ${{ secrets.DB_HOST }}
            DB_PASSWORD: ${{ secrets.DB_HOST }}

          ports:
            - 3006:3306
          options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=3

      steps:
      - name: checkout backend
        uses: actions/checkout@v4

      - name: Use node.js V18
        uses: actions/setup-node@v4
        with:
            node-version: 18

      - name: Install Backend dependencies
        run: npm ci

      - name: Initialize Database Schema
        run: mysql -h 127.0.0.1 -u root -proot mabase < init.sql

      - name: Lunching Backend tests
        run: npm test run unit
        env:
            DB_HOST: 127.0.0.1
            DB_PORT: 3306
            DB_NAME: ${{ secrets.DB_NAME }}
            DB_USER: ${{ secrets.DB_USER }}
            DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

  # start uniquement si les test unitaires on etaient valider ou non
  # branche donc la db a l'image docker une fois son test unitaire passer pour voir si le reseau fonctionne
    integration-test:
      runs-on: ubuntu-latest
      needs: [frontend-test, backend-test]
      defaults:
        run:
          working-directory: backend

      services:
        mariadb:
          image: mariadb:latest

          env:
              DB_HOST: ${{ secrets.DB_HOST }}
              DB_PORTS: ${{ secrets.DB_HOST }}
              DB_NAME: ${{ secrets.DB_HOST }}
              DB_USER: ${{ secrets.DB_HOST }}
              DB_PASSWORD: ${{ secrets.DB_HOST }}

          ports:
            - 3006:3306
          options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=3

      steps:
      - name: checkout backend
        uses: actions/checkout@v4

      - name: Starting service with compose
        run: docker compose -f ../docker-compose.yaml up -d
        env:
          DOCKER_NETWORK: ${{ job.services.mariadb.network }}

      - name: Use node.js V18
        uses: actions/setup-node@v4
        with:
            node-version: 18

      - name: Install Backend dependencies
        run: npm ci

      - name: Lunching Backend tests
        run: npm test
        env:
            DB_HOST: 127.0.0.1
            DB_PORT: 3306
            DB_NAME: ${{ secrets.DB_NAME }}
            DB_USER: ${{ secrets.DB_USER }}
            DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Shut down servie
        run: docker compose -f ../docker-compose.yaml down

    build-image:
      runs-on: ubuntu-latest
      needs: [integration-test]
      if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      # build deux image en meme temps Dockerflow
      strategy:
        matrix:
          component: [frontend, backend]

      # for github_token
      permissions:
        packages: write
        contents: read

      steps:
      - name: checkout Code
        uses: actions/checkout@v4

      - name: Log in registre
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docker images
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }} # front+back/varMatrix
          file:  ./${{ matrix.component }}/Dockerfile
          push: true
          tags: |
                ghcr.io/${{ github.repository }}/${{ matrix.component }}:latest
                ghcr.io/${{ github.repository }}/${{ matrix.component }}:${{ github.sha }}

